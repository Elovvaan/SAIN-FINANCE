name: Homepage consistency pass

on:
  push:
    paths:
      - ".github/workflows/homepage-consistency-pass.yml"

permissions:
  contents: write

jobs:
  update-homepage:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update homepage messaging
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("src/app/page.tsx")
          content = path.read_text(encoding="utf-8")

          replacements = {
              '"Financial OS (Coming Soon)"': '"Financial OS"',
              'title: "Future-ready infrastructure"': 'title: "Enterprise financial infrastructure"',
              'copy: "A foundation built to support employer, payroll, banking, and fintech collaboration over time."': 'copy: "Infrastructure connecting employer, payroll, banking, compliance, reporting, analytics, security, and financial operations."',
              'title: "Future Collaboration"': 'title: "Financial Collaboration"',
              'copy: "SAIN is preparing for thoughtful partnerships across payroll, sponsor banking, banking-as-a-service, and financial infrastructure."': 'copy: "SAIN supports partnerships across payroll, sponsor banking, banking-as-a-service, and financial infrastructure."',
          }

          missing = [old for old in replacements if old not in content]
          if missing:
              raise SystemExit("Expected homepage copy not found: " + " | ".join(missing))

          for old, new in replacements.items():
              content = content.replace(old, new)

          path.write_text(content, encoding="utf-8")
          PY

      - name: Remove one-time workflow
        run: rm -f .github/workflows/homepage-consistency-pass.yml

      - name: Commit homepage consistency pass
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/app/page.tsx .github/workflows/homepage-consistency-pass.yml
          git commit -m "Update homepage to reflect live Financial OS"
          git push
